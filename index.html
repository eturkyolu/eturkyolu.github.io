<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBESC | Coach Brooks Emotional Support Coalition</title>
    
    <!-- CDNs -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,700&family=Geist+Mono:wght@100..900&family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --berner-black: #171717;
            --berner-rust: #9A3412;
            --berner-white: #F8FAFC;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--berner-white);
            color: var(--berner-black);
            scroll-behavior: smooth;
            margin: 0;
            padding: 0;
        }
        .serif { font-family: 'Fraunces', serif; }
        .mono { font-family: 'Geist Mono', monospace; }
        
        .counter-glow {
            text-shadow: 0 0 20px rgba(154, 52, 18, 0.3);
        }

        .glass-nav {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(12px);
            border-bottom: 2px solid rgba(0,0,0,0.05);
        }

        .nav-link {
            position: relative;
            padding: 0.5rem 0;
            transition: all 0.2s ease;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background-color: var(--berner-rust);
            transition: width 0.3s ease;
        }

        .nav-link:hover::after, .nav-link-active::after {
            width: 100%;
        }

        .btn-rust {
            background-color: var(--berner-rust);
            color: white;
            transition: all 0.3s ease;
        }
        .btn-rust:hover {
            background-color: #7c2d12;
            transform: translateY(-1px);
        }

        .card-hover {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid #f1f1f1;
        }
        .card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.05);
            border-color: var(--berner-rust);
        }

        @keyframes pulse-slow {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        .animate-pulse-slow {
            animation: pulse-slow 3s infinite;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .sound-bar {
            width: 3px;
            background: var(--berner-rust);
            margin: 0 1px;
            animation: sound-wave 1s ease-in-out infinite;
        }
        @keyframes sound-wave {
            0%, 100% { height: 4px; }
            50% { height: 16px; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-presets="env,react">
        const { useState, useEffect, useRef } = React;

        const Icons = {
            Shield: () => (
                <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                </svg>
            ),
            Refresh: () => (
                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                </svg>
            ),
            Check: () => (
                <svg className="w-8 h-8 text-[#9A3412]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 13l4 4L19 7" />
                </svg>
            ),
            Star: () => (
                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.382-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z" />
                </svg>
            ),
            Paw: () => (
                <svg className="w-24 h-24" viewBox="0 0 24 24" fill="currentColor">
                    <circle cx="12" cy="14" r="3" />
                    <circle cx="7" cy="11" r="2.5" />
                    <circle cx="10" cy="7" r="2.5" />
                    <circle cx="14" cy="7" r="2.5" />
                    <circle cx="17" cy="11" r="2.5" />
                </svg>
            ),
            Message: () => (
<svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
<path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M8 10h.01M12 10h.01M16 10h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
</svg>
),
VolumeX: () => (
                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2" />
                </svg>
            ),
            Volume2: () => (
                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                </svg>
            )
        };

        const INITIAL_FORUM_POSTS = [
            { id: 1, author: "Anonymous", text: "He approached me mid workout and, without warning, initiated direct contact by licking the sweat off my leg. I didn’t move. I thought this might be a turning point. When I cautiously went to pet him, he immediately performed a full evasive maneuver and exited the interaction. I am struggling to understand what this means.", date: "2 hours ago", severity: 9 },
            { id: 2, author: "Anonymous", text: "I walked in and everything was calm. No barking. No reaction. He just looked at me and then looked away. I don’t know why, but that felt worse. I would have preferred the bark.", date: " 1 day ago", severity: 7 },
            { id: 3, author: "Anonymous", text: "Is it normal for him to stand 3 feet away and just... judge? He doesn't come close, but his silence is louder than the bark.", date: "1 day ago", severity: 4 }
        ];

        const INITIAL_SUCCESS_STORIES = [
            { id: 1, author: "Mark R.", text: "Today, I entered TRAIN and Coach Brooks did not bark. He simply turned his head 45 degrees to the left and sighed. I consider this a major breakthrough.", date: "Yesterday", milestone: "The Silent Entry" },
            { id: 2, author: "Dillon S.", text: "After 6 months of strict treat diplomacy, he allowed me to stand within 4 feet of his bed to retrieve a 45lb plate. No growl. No stance change. We are in a golden era.", date: "3 days ago", milestone: "The 4-Foot Radius" }
        ];

        const Captcha = ({ onVerify }) => (
            <div className="fixed inset-0 z-[100] bg-[#171717] flex items-center justify-center p-6 text-white overflow-hidden">
                <div className="max-w-md w-full text-center space-y-16 animate-fade-in">
                    <div className="space-y-4">
                        <span className="text-[#9A3412] font-black uppercase tracking-[0.4em] text-xs">Security Verification</span>
                        <h1 className="serif text-5xl md:text-6xl font-bold">Are you Coach Brooks?</h1>
                    </div>
                    
                    <div className="grid grid-cols-2 gap-8 h-64">
                        <a 
                            href="https://youtu.be/9I5lI9-Y6Tk?si=w8Kw19MXhWZRo17_" 
                            target="_blank"
                            className="bg-white/5 border-2 border-white/10 hover:border-[#9A3412] hover:bg-[#9A3412] text-white flex flex-col items-center justify-center rounded-[3rem] transition-all duration-300 group"
                        >
                            <div className="transform transition-transform group-hover:scale-110">
                                <Icons.Paw />
                            </div>
                        </a>
                        <button 
                            onClick={onVerify}
                            className="bg-white/5 border-2 border-white/10 hover:border-white hover:bg-white text-white hover:text-black flex flex-col items-center justify-center rounded-[3rem] transition-all duration-300 group"
                        >
                            <span className="serif text-7xl md:text-8xl font-black transition-transform group-hover:scale-110">No</span>
                        </button>
                    </div>
                </div>
            </div>
        );

        const Navigation = ({ setPage, currentPage }) => (
            <nav className="fixed top-0 w-full z-50 glass-nav">
                <div className="max-w-7xl mx-auto px-4 py-2 md:px-6 md:h-24 flex flex-col md:flex-row items-center justify-between md:gap-4">
                    <div className="flex items-center gap-2 md:gap-4 cursor-pointer flex-shrink-0" onClick={() => setPage('home')}>
                        <div className="w-14 h-14 md:w-20 md:h-20 rounded-full overflow-hidden">
                            <img src="logo.PNG" alt="CBESC Logo" className="w-full h-full object-cover" />
                        </div>
                        <div className="flex flex-col">
                            <span className="serif text-[10px] md:text-xl font-extrabold tracking-tight text-black whitespace-nowrap leading-tight text-center md:text-left">
                                Coach Brooks Emotional Support Coalition
                            </span>
                        </div>
                    </div>
                    
                    <div className="flex w-full md:w-auto justify-between md:justify-end border-t border-gray-100 md:border-t-0 mt-2 md:mt-0 pt-2 md:pt-0 gap-x-1 md:gap-x-8">
                        {[
                            {id: 'home', label: 'home'}, 
                            {id: 'about', label: 'about'}, 
                            {id: 'eligible', label: 'Eligible?'}, 
                            {id: 'faq', label: 'faq'}, 
                            {id: 'success', label: 'success'}, 
                            {id: 'forum', label: 'forum'}, 
                            {id: 'donate', label: 'donate'}
                        ].map(p => (
                            <button 
                                key={p.id}
                                onClick={() => setPage(p.id)}
                                className={`nav-link text-[8.5px] md:text-[10px] uppercase tracking-tighter md:tracking-[0.15em] font-extrabold transition-all duration-300 whitespace-nowrap
                                    ${currentPage === p.id 
                                        ? 'text-[#9A3412] nav-link-active' 
                                        : 'text-[#171717] hover:text-[#9A3412]'
                                    }`}
                            >
                                {p.label}
                            </button>
                        ))}
                    </div>
                </div>
            </nav>
        );

        const Hero = () => {
    const [days, setDays] = useState(0);
    const [hours, setHours] = useState(0);
    const [minutes, setMinutes] = useState(48);
    const [seconds, setSeconds] = useState(12);

    useEffect(() => {
        const timer = setInterval(() => {
            setSeconds(s => {
                if (s === 59) {
                    setMinutes(m => {
                        if (m === 59) {
                            setHours(h => {
                                if (h === 23) {
                                    setDays(d => d + 1);
                                    return 0;
                                }
                                return h + 1;
                            });
                            return 0;
                        }
                        return m + 1;
                    });
                    return 0;
                }
                return s + 1;
            });
        }, 1000);
        return () => clearInterval(timer);
    }, []);

    const handleReset = () => {
        setDays(0);
        setHours(0);
        setMinutes(0);
        setSeconds(0);
    };

    return (
        <section className="pt-32 md:pt-24 pb-20 px-6 max-w-7xl mx-auto grid lg:grid-cols-2 gap-8 lg:gap-16 items-center">
            <div className="relative group overflow-hidden rounded-2xl">
            <div className="relative w-full h-[220px] md:h-[550px] border-4 border-white shadow-2xl rounded-2xl overflow-hidden group">
                <div 
                    className="w-full h-full bg-cover bg-center grayscale group-hover:grayscale-0 transition-all duration-1000 ease-in-out"
                    style={{ backgroundImage: 'url("hero.jpg")' }}
                ></div>
            </div>
        </div>

            <div className="flex flex-col justify-center">
                <div className="mb-6">
                    <span className="inline-block px-4 py-1 rounded-full bg-red-50 text-[#9A3412] text-[10px] font-black tracking-widest uppercase mb-4 animate-pulse-slow">
                        Status: Actively Judging
                    </span>
                    <h1 className="serif text-4xl md:text-6xl lg:text-7xl font-bold leading-tight mb-4 text-black">
                        For the Barked At, the Judged, and the <span className="text-[#9A3412]">Ignored</span>.
                    </h1>
                </div>

                <div className="bg-white border-2 border-gray-100 rounded-[2.5rem] p-6 md:p-8 shadow-2xl max-w-xl">
                    <div className="bg-[#171717] text-white rounded-2xl py-3 px-6 mb-8 flex items-center justify-between">
                        <h3 className="mono text-xs md:text-sm font-black uppercase tracking-[0.2em] flex items-center gap-3">
                            <span className="w-2 h-2 rounded-full bg-[#9A3412] animate-pulse"></span>
                            Current Non Barking Streak
                        </h3>
                        <span className="text-[10px] font-bold text-gray-400 uppercase">Live Feed</span>
                    </div>

                    <div className="flex gap-2 md:gap-4 items-center justify-center mb-6">
                        {[{v: days, l:'Days'}, {v: hours, l:'Hours'}, {v: minutes, l:'Mins'}, {v: seconds, l:'Secs'}].map((item, i) => (
                            <React.Fragment key={item.l}>
                                <div className="flex-1 text-center">
                                    <div className={`mono text-4xl md:text-6xl lg:text-7xl font-black tracking-tighter counter-glow ${i === 3 ? 'text-[#9A3412]' : 'text-black'}`}>
                                        {item.v.toString().padStart(2, '0')}
                                    </div>
                                    <div className="text-[9px] md:text-[10px] uppercase font-black text-gray-400 mt-2 tracking-widest">{item.l}</div>
                                </div>
                                {i < 3 && <div className="text-3xl md:text-5xl font-light text-gray-100 mb-6">:</div>}
                            </React.Fragment>
                        ))}
                    </div>

                    <div className="mt-6 pt-6 border-t border-gray-50">
                        <button 
                            onClick={handleReset}
                            className="w-full bg-[#171717] hover:bg-[#9A3412] text-white py-4 rounded-xl font-black uppercase text-[11px] tracking-[0.3em] transition-all flex items-center justify-center gap-3"
                        >
                            <Icons.Refresh />
                            Submit for Reconsideration
                        </button>
                    </div>
                </div>
            </div>
        </section>
    );
};

const AboutSection = () => (
            <section className="pt-32 md:pt-32 pb-20 bg-white px-6">
                <div className="max-w-4xl mx-auto">
                    <div className="text-center mb-16">
                        <span className="text-[#9A3412] font-black text-xs uppercase tracking-[0.3em]">OUR FOUNDATION</span>
                        <h2 className="serif text-3xl md:text-4xl font-bold mt-2 text-black">Who We Are</h2>
                        <div className="w-12 h-1.5 bg-[#9A3412] mx-auto mt-6"></div>
                    </div>

                    <div className="bg-gray-50 border-l-4 border-[#9A3412] p-8 md:p-16 rounded-r-[3rem] shadow-sm mb-12">
                        <div className="prose prose-lg text-gray-600 space-y-6 leading-relaxed max-w-none text-sm md:text-base">
                            <p>Founded in <span className="font-bold text-black">June 2025</span>, the Coach Brooks Emotional Support Coalition (CBESC) was created in response to an urgent issue: the emotional toll of being barked at or professionally ignored by Coach Brooks.</p>
                            <p>Good people were showing up to TRAIN on time, only to be met with suspicion or vocal correction from a dog with extremely high standards.</p>
                            <p>Coach Brooks is a well regarded part of the gym, and a reminder that approval does not come easily. CBESC exists for the innocent people who got barked at before they had a fair chance to prove themselves.</p>
                        </div>
                    </div>
                </div>
            </section>
        );

        const SuccessSection = () => {
            const [stories, setStories] = useState(INITIAL_SUCCESS_STORIES);
            const [newName, setNewName] = useState("");
            const [newStory, setNewStory] = useState("");

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!newStory) return;
                const story = {
                    id: Date.now(),
                    author: newName || "Anonymous",
                    text: newStory,
                    date: "Just now",
                    milestone: "User Reported Win"
                };
                setStories([story, ...stories]);
                setNewStory("");
                setNewName("");
            };

            return (
                <section className="pt-32 md:pt-40 pb-20 px-6 max-w-4xl mx-auto">
                    <div className="mb-16">
                        <span className="text-[#9A3412] font-black text-xs uppercase tracking-[0.3em]">THE HALL OF TRIUMPHS</span>
                        <h2 className="serif text-4xl md:text-5xl font-bold mt-2 text-black">SUCCESS STORIES</h2>
                        <div className="w-12 h-1.5 bg-[#9A3412] mt-6 mb-12"></div>
                        
                        <div className="bg-gray-50 border-l-4 border-[#9A3412] p-6 md:p-10 rounded-r-[2rem] shadow-sm mb-16">
                            <h3 className="serif text-xl font-bold mb-4">Stories of Progress, Healing, and Conditional Acceptance</h3>
                            <p className="text-gray-600 leading-relaxed italic text-sm">
                                At the Coach Brooks Emotional Support Coalition, we believe every step forward matters. Whether it is a reduced bark response, an uninterrupted gym entry, or a brief but meaningful moment of mutual tolerance, these victories deserve to be recognized.
                            </p>
                            <p className="text-gray-600 leading-relaxed italic text-sm mt-4">
                                The following stories are shared with permission from members of the TRAIN and CycleFit community who have shown courage, resilience, and a continued willingness to return despite ongoing emotional uncertainty.
                            </p>
                        </div>
                    </div>

                    <form onSubmit={handleSubmit} className="bg-white border-2 border-gray-100 p-8 rounded-3xl shadow-sm mb-12">
                        <h3 className="serif text-xl font-bold mb-6 text-black">Submit a Milestone</h3>
                        <div className="space-y-4">
                            <div>
                                <label className="text-[10px] font-black uppercase text-gray-400 tracking-widest mb-2 block">Name / Identifier</label>
                                <input 
                                    type="text"
                                    value={newName}
                                    onChange={(e) => setNewName(e.target.value)}
                                    placeholder="e.g. Squat-Rack-Steve (Leave blank for Anonymous)"
                                    className="w-full p-4 bg-gray-50 border-2 border-gray-100 rounded-xl focus:ring-2 focus:ring-[#9A3412] outline-none transition-all placeholder:text-gray-300 text-sm"
                                />
                            </div>
                            <div>
                                <label className="text-[10px] font-black uppercase text-gray-400 tracking-widest mb-2 block">The Win</label>
                                <textarea 
                                    value={newStory}
                                    onChange={(e) => setNewStory(e.target.value)}
                                    className="w-full h-32 p-4 bg-gray-50 border-2 border-gray-100 rounded-xl focus:ring-2 focus:ring-[#9A3412] outline-none transition-all placeholder:text-gray-300 text-sm"
                                    placeholder="Describe your moment of grace... (e.g., 'He let me walk past him without checking my credentials')"
                                ></textarea>
                            </div>
                        </div>
                        <div className="mt-8 flex justify-end">
                            <button className="btn-rust px-10 py-4 rounded-full font-black uppercase text-[11px] tracking-[0.2em] shadow-lg shadow-orange-900/20">
                                Share Progress
                            </button>
                        </div>
                    </form>

                    <div className="space-y-6 mb-20">
                        {stories.map(story => (
                            <div key={story.id} className="bg-white p-8 rounded-3xl card-hover border-2 border-gray-50">
                                <div className="flex justify-between items-start mb-6">
                                    <div className="flex items-center gap-3">
                                        <div className="w-10 h-10 bg-orange-50 rounded-full flex items-center justify-center text-[#9A3412]">
                                            <Icons.Star />
                                        </div>
                                        <div>
                                            <span className="text-[10px] font-black uppercase text-black tracking-widest">{story.author}</span>
                                            <p className="text-[10px] text-gray-300 font-bold uppercase mt-1">{story.date}</p>
                                        </div>
                                    </div>
                                    <div className="bg-[#9A3412] px-3 py-1 rounded text-[10px] font-black text-white uppercase tracking-tighter">
                                        {story.milestone}
                                    </div>
                                </div>
                                <p className="text-gray-600 leading-relaxed italic text-lg">"{story.text}"</p>
                            </div>
                        ))}
                    </div>

                    <div className="bg-[#171717] p-12 rounded-[3rem] text-center">
                        <h3 className="serif text-3xl font-bold text-[#9A3412] mb-6">Every Win Counts</h3>
                        <div className="max-w-2xl mx-auto space-y-4 text-gray-300 text-sm leading-relaxed">
                            <p>
                                At CBESC, we understand that progress may not always look dramatic. Sometimes healing looks like a shorter bark. Sometimes it looks like a calmer entrance. Sometimes it looks like realizing that being tolerated is, in fact, a meaningful step forward.
                            </p>
                            <p className="font-bold italic text-white">
                                If your relationship with Coach Brooks remains complicated, you are not alone. Your story matters, your resilience is seen, and your clearance may still be pending.
                            </p>
                        </div>
                    </div>
                </section>
            );
        };

        const EligibilitySection = () => {
            const [step, setStep] = useState(0);
            const [isChecking, setIsChecking] = useState(false);
            const [isConfirmed, setIsConfirmed] = useState(false);

            const questions = [
                "Have you been barked at within 10 seconds of entering TRAIN?",
                "Have you mistaken temporary silence for acceptance?",
                "Have you ever brought treats as part of a peacekeeping strategy?",
                "Has Brooks been visibly nicer to the person next to you?",
                "Do you currently feel you are on some kind of probation?",
                "Do you avoid eye contact with the mirrors if he is reflected in them?",
                "Have you ever apologized to him for the sound of a dropping weight?"
            ];

            const nextStep = () => {
                if (step < questions.length - 1) {
                    setStep(step + 1);
                } else {
                    setIsChecking(true);
                    setTimeout(() => {
                        setIsChecking(false);
                        setIsConfirmed(true);
                    }, 2500);
                }
            };

            if (isConfirmed) {
                return (
                    <div className="pt-32 md:pt-32 pb-20 px-6 max-w-2xl mx-auto text-center">
                        <div className="bg-white border-4 border-[#9A3412] p-12 rounded-[2rem] shadow-2xl relative overflow-hidden">
                            <div className="w-20 h-20 bg-orange-50 rounded-full flex items-center justify-center mx-auto mb-8">
                                <Icons.Check />
                            </div>
                            <h2 className="serif text-4xl font-bold mb-4 text-black uppercase tracking-tight">Status: Accepted</h2>
                            <p className="text-[#9A3412] font-black text-sm uppercase tracking-[0.2em] mb-8">Preliminary eligibility confirmed</p>
                            <button 
                                onClick={() => window.location.reload()} 
                                className="bg-[#171717] text-white px-10 py-4 rounded-full font-black uppercase text-[10px] tracking-widest hover:bg-[#9A3412] transition-colors"
                            >
                                Return to Coalition Mainframe
                            </button>
                        </div>
                    </div>
                );
            }

            if (isChecking) {
                return (
                    <div className="pt-32 md:pt-48 pb-20 px-6 text-center">
                        <div className="inline-block animate-spin mb-8">
                            <Icons.Refresh />
                        </div>
                        <h2 className="serif text-3xl font-bold text-black animate-pulse">Analyzing Diplomatic Standing...</h2>
                    </div>
                );
            }

            return (
                <div className="pt-32 md:pt-32 pb-20 px-6 max-w-3xl mx-auto">
                    <div className="mb-12">
                        <div className="flex justify-between items-end mb-4">
                            <div>
                                <span className="text-[#9A3412] font-black text-xs uppercase tracking-[0.3em]">Intake Process</span>
                                <h2 className="serif text-3xl md:text-4xl font-bold text-black mt-2">Am I Eligible?</h2>
                            </div>
                            <span className="mono text-gray-300 text-xs">Q {step + 1}/{questions.length}</span>
                        </div>
                        <div className="w-full h-2 bg-gray-100 rounded-full overflow-hidden">
                            <div 
                                className="h-full bg-[#9A3412] transition-all duration-500" 
                                style={{ width: `${((step + 1) / questions.length) * 100}%` }}
                            ></div>
                        </div>
                    </div>

                    <div className="bg-white border-2 border-gray-100 p-8 md:p-12 rounded-[2.5rem] shadow-sm text-center">
                        <p className="serif text-xl md:text-3xl font-bold text-black mb-12 leading-tight">
                            "{questions[step]}"
                        </p>
                        <div className="flex flex-col sm:flex-row gap-4 justify-center">
                            <button onClick={nextStep} className="flex-1 py-6 rounded-2xl bg-gray-50 border-2 border-transparent hover:border-[#9A3412] text-black font-black uppercase text-[10px] tracking-widest transition-all">
                                Affirmative (Yes)
                            </button>
                            <button onClick={nextStep} className="flex-1 py-6 rounded-2xl bg-gray-50 border-2 border-transparent hover:border-black text-black font-black uppercase text-[10px] tracking-widest transition-all">
                                Negative (No)
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const Forum = () => {
    const [posts, setPosts] = useState(INITIAL_FORUM_POSTS);
    const [newPost, setNewPost] = useState("");
    const [severity, setSeverity] = useState(5);

    const handleSubmit = (e) => {
        e.preventDefault();
        if (!newPost) return;
        const post = {
            id: Date.now(),
            author: "Anonymous",
            text: newPost,
            date: "Just now",
            severity: severity
        };
        setPosts([post, ...posts]);
        setNewPost("");
        setSeverity(5);
    };

    return (
        <section className="pt-40 pb-20 px-6 max-w-4xl mx-auto">
            <div className="flex items-center justify-between mb-12">
                <div>
                    <h2 className="serif text-4xl font-bold text-black">INCIDENT REPORTS</h2>
                    <p className="text-gray-400 text-sm mt-1 uppercase tracking-widest font-semibold">Lived Experiences</p>
                </div>
                <div className="flex items-center gap-2 text-[#9A3412] font-bold">
                    <Icons.Message />
                    <span className="mono">{posts.length}</span>
                </div>
            </div>

            <form onSubmit={handleSubmit} className="bg-white border-2 border-gray-100 p-8 rounded-3xl shadow-sm mb-12">
                <h3 className="serif text-xl font-bold mb-6 text-black">Log a New Interaction</h3>
                <textarea 
                    value={newPost}
                    onChange={(e) => setNewPost(e.target.value)}
                    className="w-full h-32 p-4 bg-gray-50 border-2 border-gray-100 rounded-xl focus:ring-2 focus:ring-[#9A3412] focus:border-transparent outline-none transition-all placeholder:text-gray-300"
                    placeholder="Describe the incident... (e.g. 'He barked when I looked at the dumbbell rack')"
                ></textarea>

                <div className="mt-8 flex flex-wrap items-center justify-between gap-6">
                    <div className="flex items-center gap-6 bg-gray-50 px-6 py-3 rounded-full border border-gray-100">
                        <label className="text-[10px] font-black uppercase text-gray-400 tracking-tighter">Bark Decibels:</label>
                        <input 
                            type="range" min="1" max="10" 
                            value={severity} 
                            onChange={(e) => setSeverity(parseInt(e.target.value))}
                            className="accent-[#9A3412] w-24"
                        />
                        <span className="mono font-bold text-[#9A3412]">{severity}/10</span>
                    </div>
                    <button className="btn-rust px-10 py-4 rounded-full font-black uppercase text-[11px] tracking-[0.2em] shadow-lg shadow-orange-900/20">
                        Submit Anonymously
                    </button>
                </div>
            </form>

            <div className="space-y-6">
                {posts.map(post => (
                    <div key={post.id} className="bg-white p-8 rounded-3xl card-hover">
                        <div className="flex justify-between items-start mb-6">
                            <div>
                                <span className="text-[10px] font-black uppercase text-[#9A3412] tracking-widest">{post.author}</span>
                                <p className="text-[10px] text-gray-300 font-bold uppercase mt-1">{post.date}</p>
                            </div>
                            <div className="bg-[#171717] px-3 py-1 rounded text-[10px] font-black text-white uppercase tracking-tighter">
                                Intensity: {post.severity}
                            </div>
                        </div>
                        <p className="text-gray-600 leading-relaxed italic text-lg">"{post.text}"</p>
                    </div>
                ))}
            </div>
        </section>
    );
};

const FAQSection = () => {
            const faqs = [
                { q: "Does Brooks hate me?", a: "Not officially. His reactions are based on a complex internal algorithm involving your scent, your footwear, and your perceived level of entitlement to the gym floor." },
                { q: "Can trust be earned?", a: "There have been isolated reports of peaceful proximity lasting upwards of 12 seconds. However, trust is non-cumulative; every entrance to the gym is a fresh security audit." },
                { q: "Do treats help?", a: "They can improve diplomatic conditions. We recommend high-protein bribes. Note that receiving a treat does not constitute a friendship, only a temporary non-aggression pact." },
                { q: "Why is he nice to everyone else?", a: "We ask that you not rush your healing. Comparing your journey to those of 'The Accepted' only hinders your emotional stabilization." },
                { q: "Is this personal?", a: "Unfortunately, yes. But also maybe not. It is a deeply personal assessment of your general vibe that he then broadcasts publicly to the entire facility." },
                { q: "What does it mean if he stops barking and just stares?", a: "This is generally considered a more advanced level of evaluation. Remain calm and avoid interpreting it as approval." },
                { q: "Should I bark back?", a: "NO. We do not engage in vocal escalation. We remain stoic in the face of judgment." }
            ];

            return (
                <section className="pt-32 md:pt-40 pb-20 px-6 max-w-4xl mx-auto">
                    <div className="mb-16">
                        <span className="text-[#9A3412] font-black text-xs uppercase tracking-[0.3em]">Protocol & Guidance</span>
                        <h2 className="serif text-4xl md:text-5xl font-bold mt-2 text-black">Common Inquiries</h2>
                        <div className="w-12 h-1.5 bg-[#9A3412] mt-6"></div>
                    </div>
                    
                    <div className="space-y-6">
                        {faqs.map((faq, i) => (
                            <div key={i} className="bg-white border-2 border-gray-100 p-8 rounded-3xl card-hover">
                                <h3 className="serif text-xl font-bold text-black mb-4 flex gap-4">
                                    <span className="text-[#9A3412] mono font-bold">Q{i+1}.</span>
                                    {faq.q}
                                </h3>
                                <div className="pl-12 border-l-2 border-gray-50">
                                    <p className="text-gray-500 leading-relaxed text-sm">
                                        {faq.a}
                                    </p>
                                </div>
                            </div>
                        ))}
                    </div>
                </section>
            );
        };

        const Donate = () => (
            <section className="pt-32 md:pt-40 pb-20 px-6 max-w-4xl mx-auto">
                <div className="bg-[#171717] text-white rounded-[3rem] p-8 md:p-16">
                    <div className="mb-10">
                        <span className="text-[#9A3412] font-black text-xs uppercase tracking-[0.3em] mb-2 block">SUPPORT THE MISSION</span>
                        <p className="text-gray-300 text-sm italic leading-relaxed">At the Coach Brooks Emotional Support Coalition, we believe support should extend beyond helping members recover from selective barking and cautious surveillance.</p>
                    </div>

                    <h3 className="serif text-2xl md:text-3xl font-bold mb-6 text-white">Honoring a Trusted Coalition Ally: Sarah</h3>
                    <div className="space-y-6 text-gray-300 text-sm md:text-lg leading-relaxed mb-12">
                        <p>We are proud to recognize Sarah, a leader within the TRAIN and CycleFit community and the mother of Coach Brooks himself, as she fundraises for the Multiple Myeloma Research Foundation (MMRF) while training for the Chicago Marathon.</p>
                        <p className="font-bold text-[#9A3412] italic">This is a cause far more important than our shared bark related hardship, and the coalition is proud to direct support toward it.</p>
                    </div>
                    
                    <div className="grid gap-8 max-w-md mx-auto mb-16">
                        <div className="space-y-3">
                            <span className="text-[10px] font-black text-gray-500 uppercase tracking-widest block text-center">Support Sarah's MMRF Fundraiser</span>
                            <button className="btn-rust w-full py-5 rounded-2xl font-black uppercase text-xs tracking-widest shadow-xl shadow-orange-950/40">Donate Through Sarah</button>
                        </div>
                        <div className="space-y-3">
                            <span className="text-[10px] font-black text-gray-500 uppercase tracking-widest block text-center">Support the broader CycleFit community</span>
                            <button className="w-full py-5 rounded-2xl border-2 border-gray-700 hover:border-[#9A3412] hover:text-[#9A3412] transition-colors font-black uppercase text-xs tracking-widest">Donate Through CycleFit</button>
                        </div>
                    </div>

                    <div className="border-t border-white/5 pt-8">
                        <p className="text-[10px] text-gray-500 leading-relaxed text-center italic">
                            Disclaimer: The coalition cannot officially confirm any relationship between charitable giving and Brooks related progress, though optimism remains high. Donations do not guarantee improved standing with Brooks, but many believe they may contribute to more favorable diplomatic conditions.
                        </p>
                        <div className="mt-4 flex flex-col gap-2">
                            <p className="text-[10px] text-gray-400 font-bold uppercase tracking-widest text-center">All proceeds for MMRF go directly to the foundation through Sarah’s marathon fundraiser.</p>
                            <p className="text-[10px] text-gray-400 font-bold uppercase tracking-widest text-center">Charitable giving is appreciated by the coalition and may or may not be noted by Brooks.</p>
                        </div>
                    </div>
                </div>
            </section>
        );

        const Footer = () => (
            <footer className="bg-white border-t border-gray-100 py-16 px-6">
                <div className="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-10">
                    <div className="flex items-center gap-3">
                        <div className="w-10 h-10 rounded-full overflow-hidden">
                        <img src="logo.PNG" alt="CBESC Logo" className="w-full h-full object-cover" />
                        </div>
                    </div>
                    <p className="text-[10px] text-gray-300 font-bold uppercase tracking-widest text-center">© 2025 CBESC. Brooks is a good boy, he just has standards.</p>
                </div>
            </footer>
        );

        const App = () => {
            const [page, setPage] = useState('home');
            const [isVerified, setIsVerified] = useState(false);
            const [isMuted, setIsMuted] = useState(false);
            const audioRef = useRef(null);

            const handleVerify = () => {
                setIsVerified(true);
                if (audioRef.current) {
                    audioRef.current.play().catch(e => console.log("Audio play prevented by browser."));
                }
            };

            const toggleMute = () => {
                if (audioRef.current) {
                    audioRef.current.muted = !isMuted;
                    setIsMuted(!isMuted);
                }
            };

            return (
                <div className="min-h-screen">
                    {/* Background Music Player - Global persistent element */}
                    <audio 
                        ref={audioRef} 
                        loop 
                        src="music.mp3" 
                        type="audio/mpeg"
                    />

                    {!isVerified ? (
                        <Captcha onVerify={handleVerify} />
                    ) : (
                        <>
                            {/* Mute Toggle Control */}
                            <button 
                                onClick={toggleMute}
                                className="fixed bottom-8 right-8 z-[100] bg-white p-4 rounded-full shadow-2xl border border-gray-100 group flex items-center gap-3"
                            >
                                <div className="flex items-end h-4">
                                    {!isMuted && [1,2,3,4].map(i => <div key={i} className="sound-bar" style={{animationDelay: `${i * 0.1}s`}}></div>)}
                                </div>
                                <span className="text-[10px] font-black uppercase tracking-widest text-black group-hover:text-[#9A3412]">
                                    {isMuted ? 'Unmute' : 'Mute'}
                                </span>
                                {isMuted ? <Icons.VolumeX /> : <Icons.Volume2 />}
                            </button>

                            <Navigation setPage={setPage} currentPage={page} />
                            <main>
                                {page === 'home' && (
                                    <>
                                        <Hero />
                                        <div className="bg-[#171717] py-24">
                                            <div className="max-w-6xl mx-auto px-6 grid md:grid-cols-3 gap-16">
                                                {[
                                                    { t: 'BEHAVIOR ANALYSIS', d: 'A detailed look at bark patterns, triggers, and what they may or may not mean about you.' },
                                                    { t: 'MOVEMENT CLEARANCE', d: 'Guidance on where you are permitted to exist without drawing attention.' },
                                                    { t: 'RECOVERY GROUPS', d: 'Structured support for those affected by Brooks’s vocal feedback or strategic indifference.' }
                                                ].map(item => (
                                                    <div key={item.t} className="space-y-4">
                                                        <h3 className="serif text-xl md:text-2xl font-bold text-white uppercase tracking-tight">{item.t}</h3>
                                                        <p className="text-gray-200 text-lg leading-relaxed">{item.d}</p>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </>
                                )}
                                {page === 'about' && <AboutSection />}
                                {page === 'eligible' && <EligibilitySection />}
                                {page === 'faq' && <FAQSection />}
                                {page === 'forum' && <Forum />}
                                {page === 'success' && <SuccessSection />}
                                {page === 'donate' && <Donate />}
                            </main>
                            <Footer />
                        </>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
